<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Gallery la fayette</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <h1>GALLERY LA FAYETTE</h1>
      <h2>Connexion</h2>
      <p>Connecte-toi pour publier, commenter et réagir.</p>

      <form class="auth-form">
        <input type="email" placeholder="Adresse e-mail" required />
        <input type="password" placeholder="Mot de passe" required />
        <button type="submit" class="btn primary">Se connecter</button>
      </form>

      <p class="auth-link">
        Pas encore de compte ? <a href="register.html">Créer un compte</a>
      </p>

      <a href="index.html" class="back-link">← Retour à l’accueil</a>
    </div>
  </div>
 <script>
  // Fonction utilitaire pour afficher des notifications Toast premium
  function showToast(message, type = "success") {
    let container = document.getElementById("toast-container");
    if (!container) {
      container = document.createElement("div");
      container.id = "toast-container";
      document.body.appendChild(container);
    }

    const toast = document.createElement("div");
    toast.className = `toast toast-${type}`;

    let icon = "🔔";
    if (type === "success") icon = "✅";
    else if (type === "error") icon = "❌";
    else if (type === "info") icon = "ℹ️";
    else if (type === "warning") icon = "⚠️";

    toast.innerHTML = `
      <span class="toast-icon">${icon}</span>
      <span class="toast-message">${message}</span>
    `;

    container.appendChild(toast);

    setTimeout(() => {
      toast.classList.add("fade-out");
      toast.addEventListener("animationend", () => {
        toast.remove();
      });
    }, 3000);
  }

  const form = document.querySelector(".auth-form");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const email = form.querySelector('input[type="email"]').value;
    const password = form.querySelector('input[type="password"]').value;

    try {
      const response = await fetch("/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (response.ok) {
        showToast(data.message, "success");
        // Délai de redirection pour laisser le temps de voir la notification
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1200);
      } else {
        showToast(data.error, "error");
      }
    } catch (error) {
      console.error("Erreur détaillée:", error);
      showToast("Erreur serveur", "error");
    }
  });
</script>
</body>
</html>
